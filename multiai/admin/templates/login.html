<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ ui.login_title }}</title>
  <style>
    body { margin:0; font-family:'Vazirmatn','Tahoma',sans-serif; background:#eef2f7; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { background:#fff; width:100%; max-width:380px; padding:24px; border-radius:18px; box-shadow:0 12px 24px rgba(20,60,120,0.12); }
    h1 { margin:0 0 14px; text-align:center; font-size:20px; }
    label { display:block; margin-bottom:6px; font-size:14px; color:#304055; }
    input { width:100%; padding:10px 12px; border:1px solid #d5dbe3; border-radius:10px; margin-bottom:12px; }
    button { width:100%; padding:11px; border:none; border-radius:10px; background:#0f5a8a; color:#fff; font-weight:700; cursor:pointer; }
    .errors { background:#fdecec; color:#8a2c2c; padding:10px; border-radius:10px; margin-bottom:10px; font-size:13px; }
    .hint { text-align:center; color:#8a96a6; font-size:12px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ ui.login_heading }}</h1>
    {% if error %}
      <div class="errors">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <label>{{ ui.username_label }}</label>
      <input name="username" autocomplete="username" />
      <label>{{ ui.password_label }}</label>
      <input name="password" type="password" autocomplete="current-password" />
      <button type="submit">{{ ui.login_button }}</button>
    </form>
    <div class="hint">پلتفرم هوش مصنوعی فارسی</div>
  </div>
</body>
</html>
