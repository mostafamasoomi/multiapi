services:
  postgres:
    image: postgres:16-alpine
    container_name: multiapi_pg
    environment:
      POSTGRES_USER: multiai2
      POSTGRES_PASSWORD: multiai2_dev_pass
      POSTGRES_DB: multiai2
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: multiapi_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
  api:
    build:
      context: ./multiai/backend
      dockerfile: Dockerfile
    container_name: multiapi_api
    network_mode: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://multiai2:multiai2_dev_pass@127.0.0.1:5432/multiai2
      REDIS_URL: redis://127.0.0.1:6379/0
      NINEROUTER_BASE_URL: http://127.0.0.1:20128
      MOCK_MODE: "true"
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
volumes:
  pgdata:
  redisdata:
