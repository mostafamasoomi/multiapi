services:
  postgres:
    image: postgres:16-alpine
    container_name: multiapi_pg
    environment:
      POSTGRES_USER: multiai2
      POSTGRES_PASSWORD: multiai2_dev_pass
      POSTGRES_DB: multiai2
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiai2"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: multiapi_redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "dad09781c3ae7bde035c7f00a88650ba"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multiapi_backend
    network_mode: host
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8800/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: "http://127.0.0.1:8800"
    container_name: multiapi_frontend
    ports:
      - "127.0.0.1:3005:3005"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cron-pnl:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multiapi_cron_pnl
    command: ["python", "-m", "app.pnl_daily"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://multiai2:multiai2_dev_pass@postgres:5432/multiai2
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cron-brakes:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multiapi_cron_brakes
    command: ["python", "-m", "app.brakes_monitor"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
