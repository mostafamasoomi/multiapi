services:
  postgres:
    image: postgres:16-alpine
    container_name: multiapi_pg
    environment:
      POSTGRES_USER: multiai2
      POSTGRES_PASSWORD: multiai2_dev_pass
      POSTGRES_DB: multiai2
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: multiapi_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  backend:
    build:
      context: ./multiai/backend
      dockerfile: Dockerfile
    container_name: multiapi_backend
    network_mode: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://multiai2:multiai2_dev_pass@127.0.0.1:5432/multiai2
      REDIS_URL: redis://127.0.0.1:6379/0
      NINEROUTER_BASE_URL: http://127.0.0.1:20128
      MOCK_MODE: "true"
      MASTER_SECRET: ${MASTER_SECRET}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multiapi_frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      BACKEND_URL: http://127.0.0.1:8800
    depends_on:
      - backend
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: multiapi_bot
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_URL: http://127.0.0.1:8800
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      PAYMENT_CALLBACK_URL: ${PAYMENT_CALLBACK_URL}
    depends_on:
      - backend
    restart: unless-stopped

  cron-settle:
    build:
      context: ./multiai/backend
      dockerfile: Dockerfile
    container_name: multiapi_cron_settle
    command: ["python", "app/settle_cron.py"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://multiai2:multiai2_dev_pass@127.0.0.1:5432/multiai2
    depends_on:
      - postgres
    restart: unless-stopped

  cron-pnl:
    build:
      context: ./multiai/backend
      dockerfile: Dockerfile
    container_name: multiapi_cron_pnl
    command: ["python", "-m", "app.pnl_daily"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://multiai2:multiai2_dev_pass@127.0.0.1:5432/multiai2
    depends_on:
      - postgres
    restart: unless-stopped

  cron-brakes:
    build:
      context: ./multiai/backend
      dockerfile: Dockerfile
    container_name: multiapi_cron_brakes
    command: ["python", "-m", "app.brakes_monitor"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://multiai2:multiai2_dev_pass@127.0.0.1:5432/multiai2
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
