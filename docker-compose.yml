services:
  postgres:
    image: postgres:16-alpine
    container_name: multiai2_pg
    environment:
      POSTGRES_USER: multiai2
      POSTGRES_PASSWORD: multiai2_dev_pass
      POSTGRES_DB: multiai2
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: multiai2_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
  api:
    build:
      context: ./multiai/backend
      dockerfile: Dockerfile
    container_name: multiai2_api
    environment:
      DATABASE_URL: postgresql+asyncpg://multiai2:multiai2_dev_pass@postgres:5432/multiai2
      REDIS_URL: redis://redis:6379/0
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    ports:
      - "8000:8000"
volumes:
  pgdata:
  redisdata:
